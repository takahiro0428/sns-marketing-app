name: Deploy to Firebase

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  NODE_VERSION: '22'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./app

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build Nuxt application
        run: npm run build
        env:
          FIREBASE_API_KEY: ${{ secrets.FIREBASE_API_KEY }}
          FIREBASE_AUTH_DOMAIN: ${{ secrets.FIREBASE_AUTH_DOMAIN || format('{0}.firebaseapp.com', secrets.FIREBASE_PROJECT_ID) }}
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_STORAGE_BUCKET: ${{ secrets.FIREBASE_STORAGE_BUCKET || format('{0}.firebasestorage.app', secrets.FIREBASE_PROJECT_ID) }}
          FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
          FIREBASE_APP_ID: ${{ secrets.FIREBASE_APP_ID }}
          FIRESTORE_DATABASE_ID: ${{ secrets.FIRESTORE_DATABASE_ID || '(default)' }}
          VERTEX_AI_MODEL: ${{ secrets.VERTEX_AI_MODEL || 'gemini-2.0-flash' }}
          VERTEX_AI_LOCATION: ${{ secrets.VERTEX_AI_LOCATION || 'us-central1' }}

      - name: Install Cloud Functions dependencies
        # Nitro traces external dependencies and places partial copies in
        # .output/server/node_modules/ (only the files the app actually imports).
        # When npm install runs, it sees these partial packages already at the
        # correct version and skips reinstalling them. This breaks firebase-functions
        # which imports firebase-admin subpaths (e.g. app-check) not used by app code.
        # Fix: remove the entire Nitro-traced node_modules so npm installs full packages.
        # Nitro defaults firebase-functions to "latest" in the generated package.json
        # because the app code doesn't import it directly (only Nitro's runtime does).
        # Pin it to a known-good version for reproducible builds.
        # --ignore-scripts: skips postinstall scripts from transitive deps (e.g. puppeteer).
        # --no-package-lock: this is a build artifact, not a source project.
        run: |
          cd .output/server
          rm -rf node_modules
          node --input-type=commonjs -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.dependencies['firebase-functions'] = '^7.2.0';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2));
          "
          npm install --ignore-scripts --no-package-lock
          test -f node_modules/firebase-admin/lib/esm/app-check/index.js || { echo "ERROR: firebase-admin/app-check ESM module missing"; exit 1; }
          test -f node_modules/firebase-functions/lib/esm/common/providers/https.mjs || { echo "ERROR: firebase-functions ESM module missing"; exit 1; }

      - name: Deploy Cloud Functions
        uses: w9jds/firebase-action@v15.13.0
        with:
          args: deploy --only functions
        env:
          GCP_SA_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          PROJECT_PATH: ./app

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          channelId: live
          projectId: ${{ secrets.FIREBASE_PROJECT_ID }}
          entryPoint: ./app

      - name: Deploy Firestore Rules & Indexes
        uses: w9jds/firebase-action@v15.13.0
        with:
          args: deploy --only firestore
        env:
          GCP_SA_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          PROJECT_PATH: ./app

      - name: Deploy Storage Rules
        uses: w9jds/firebase-action@v15.13.0
        with:
          args: deploy --only storage
        env:
          GCP_SA_KEY: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          PROJECT_PATH: ./app
